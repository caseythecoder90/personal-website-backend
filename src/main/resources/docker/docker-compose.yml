version: '3.8'
# Local development setup
# Copy .env.example to .env and fill in your local credentials before running
services:
  postgres:
    image: postgres:16-alpine
    container_name: personal-website-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_website}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-personal_website}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - personal-website-network

  redis:
    image: redis:7-alpine
    container_name: personal-website-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - personal-website-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  personal-website-network:
    driver: bridge