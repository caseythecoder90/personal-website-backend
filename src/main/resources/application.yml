spring:
  application:
    name: personal-website-backend
    version: @project.version@

  jackson:
    default-property-inclusion: non_null

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PersonalWebsitePool
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 300000        # 5 minutes
      max-lifetime: 1800000       # 30 minutes
      connection-timeout: 20000   # 20 seconds

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  thymeleaf:
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  cache:
    type: redis
    redis:
      time-to-live: 600000

  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 15MB
      max-request-size: 15MB
      file-size-threshold: 2MB

# Cloudinary configuration
cloudinary:
  cloud-name: ${CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  folder: portfolio-images
  secure: true

# JWT configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

# Jasypt encryption
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Resend email configuration
resend:
  api-key: ${RESEND_API_KEY}
  from-email: "Casey Quinn <noreply@caseylovesyas.com>"
  owner-email: ${OWNER_EMAIL}

# Application-specific configuration
app:
  projects:
    max-count: 20
  images:
    max-per-project: 20
    max-per-blog-post: 20
    max-file-size: 10485760
    allowed-content-types: image/jpeg,image/png,image/gif,image/webp
  resume:
    max-file-size: 5242880

# Server configuration
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Rate limiting configuration
rate-limiting:
  enabled: true
  public-api:
    requests: 60
    duration-minutes: 1
  login:
    requests: 5
    duration-minutes: 1
  admin-api:
    requests: 30
    duration-minutes: 1

# Logging configuration
logging:
  level:
    com.caseyquinn.personal_website: INFO
    org.springframework.security: INFO
    org.hibernate.orm.connections.pooling: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%16.16thread] %36.36logger{36} - %msg%n"
